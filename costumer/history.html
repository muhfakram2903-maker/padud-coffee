                <div

                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>ID
                            Transaksi</span><strong style="color: var(--text-dark);" id="modalTxId">ORD-0000</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Waktu
                            Transaksi</span><strong style="color: var(--text-dark);" id="modalTxTime">14:30</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>Kasir</span><strong style="color: var(--text-dark);" id="modalCashier">System</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span>Metode
                            Pembayaran</span><strong style="color: var(--text-dark);" id="modalPayment">QRIS</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;"><span>Nama Pemesan</span><strong
                            style="color: var(--text-dark);">

                        </strong></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="downloadReceiptPDF()"><i class="fa-solid fa-download"
                        style="margin-right: 8px;"></i> Download Struk</button>

        <!-- Bottom Navigation Dashboard -->
        <nav class="bottom-nav">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

        // Dummy Data History
        const dummyHistory = [
            {
                id: "ORD-8821",
                date: "Sabtu, 06 Jun 2026, 14:30",
                status: "Diproses",
                payment: "QRIS",
                voucherDiscount: 10000,
                items: [
                    { name: "Padud Aren Latte", qty: 2, price: 25000, notes: "Es dipisah" },
                    { name: "Butter Croissant", qty: 1, price: 22000, notes: "" }
                ]
            },
            {
                id: "ORD-8815",
                date: "Jumat, 05 Jun 2026, 10:15",
                status: "Selesai",
                payment: "E-Wallet",
                items: [
                    { name: "Premium Matcha", qty: 1, price: 28000, notes: "" }
                ]
            },
            {
                id: "ORD-8802",
                date: "Kamis, 04 Jun 2026, 19:45",
                status: "Selesai",
                payment: "Kasir",
                items: [
                    { name: "Classic Americano", qty: 2, price: 20000, notes: "No sugar" },
                    { name: "Truffle Fries", qty: 1, price: 25000, notes: "" }
                ]
            },
            {
                id: "ORD-8799",
                date: "Rabu, 03 Jun 2026, 08:20",
                status: "Diproses",
                payment: "QRIS",
                items: [
                    { name: "Choco Lava Cake", qty: 1, price: 30000, notes: "" }
                ]
            }
        ];

        let currentFilter = 'Semua';

        const getBadgeHTML = (status) => {
            const classMap = { "Diproses": "diproses", "Disiapkan": "disiapkan", "Selesai": "selesai" };
            return `<span class="badge ${classMap[status]}">${status}</span>`;
        };

        const calculateTotal = (items) => items.reduce((sum, item) => sum + (item.price * item.qty), 0);

        const renderHistory = () => {
            const listContainer = document.getElementById('historyList');
            if (!listContainer) return;

            const query = document.getElementById('searchHistory').value.toLowerCase();

            const filtered = dummyHistory.filter(h => {
                const matchStatus = currentFilter === 'Semua' || h.status === currentFilter;
                const matchSearch = h.id.toLowerCase().includes(query) || h.items.some(i => i.name.toLowerCase().includes(query));
                return matchStatus && matchSearch;
            });

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; padding: 40px 0; color: var(--text-light); font-size: 14px;">Tidak ada riwayat transaksi ditemukan.</div>`;
                return;
            }

            let html = '';
            filtered.forEach(h => {
                const totalAmount = calculateTotal(h.items);
                const isMember = "<?php echo $is_member ? 'true' : 'false'; ?>" === "true";
                const discount = isMember ? totalAmount * 0.10 : 0;
                const voucherDiscount = h.voucherDiscount || 0;
                const tax = 2500;
                const grandTotal = totalAmount - discount - voucherDiscount + tax;

                html += `
                    <div class="h-card fade-in" onclick='openModal(${JSON.stringify(h)})'>
                        <div class="h-top">
                            <div>
                                <div class="h-id">#${h.id}</div>
                                <div class="h-date">${h.date}</div>
                            </div>
                            ${getBadgeHTML(h.status)}
                        </div>
                        <div class="h-content">
                            <img src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=100&q=80" class="h-img">
                            <div class="h-info">
                                <h4>${h.items[0].name} ${h.items.length > 1 ? `+${h.items.length - 1} item` : ''}</h4>
                                <p>${h.items[0].qty}x - ${formatRupiah(h.items[0].price)}</p>
                            </div>
                        </div>
                        <div class="h-bottom">
                            <div>
                                <div class="h-total-label">Total Belanja</div>
                                <div class="h-total-val">${formatRupiah(grandTotal)}</div>
                            </div>
                            <button class="btn-detail">Lihat Detail</button>
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;
        };

        window.setFilter = (status, btn) => {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderHistory();
        };

        window.filterHistory = () => {
            renderHistory();
        };

        // Modal Logic
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('detailModal');

        const closeModal = () => {
            modal.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.openModal = (data) => {
            document.getElementById('modalOrderId').innerText = '#' + data.id;
            document.getElementById('modalDate').innerText = data.date;
            document.getElementById('modalBadge').innerHTML = getBadgeHTML(data.status);

            // Populate new fields
            document.getElementById('modalTxId').innerText = data.id;

            // Extract time and day from "Sabtu, 06 Jun 2026, 14:30"
            const timePart = data.date.includes(',') ? data.date.split(',').pop().trim() : data.date;
            document.getElementById('modalTxTime').innerText = timePart;

            document.getElementById('modalCashier').innerText = "Rina (Kasir 1)";
            document.getElementById('modalPayment').innerText = data.payment;

            // Render Timeline
            let timelineHTML = '';
            const steps = ["Pesanan Diterima", "Sedang Disiapkan", "Pesanan Selesai"];
            let activeIdx = 0;
            if (data.status === "Diproses") activeIdx = 0;
            if (data.status === "Disiapkan") activeIdx = 1;
            if (data.status === "Selesai") activeIdx = 2;

            steps.forEach((s, idx) => {
                timelineHTML += `
                    <div class="tl-item ${idx <= activeIdx ? 'active' : ''}">
                        <div class="tl-dot"></div>
                        <div class="tl-time">${idx <= activeIdx ? timePart : '--:--'}</div>
                        <div class="tl-text">${s}</div>
                    </div>
                `;
            });
            document.getElementById('modalTimeline').innerHTML = timelineHTML;

            // Render Items and calculate receipt values
            let receiptHTML = '';
            let printItemsHTML = '';
            let subtotal = 0;
            data.items.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;

                receiptHTML += `
                    <div class="receipt-item">
                        <span style="flex-grow:1;">${item.qty}x ${item.name} <br/><small style="color:var(--text-light);">${item.notes}</small></span>
                        <span>${formatRupiah(itemTotal)}</span>
                    </div>
                `;

                // Print items HTML
                printItemsHTML += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <span style="flex: 2; padding-right: 5px;">${item.name} ${item.notes ? '<br/><span style="font-size: 9px; color: #555;">* ' + item.notes + '</span>' : ''}</span>
                        <span style="flex: 1; text-align: center;">${item.qty}x</span>
                        <span style="flex: 1.5; text-align: right;">${formatRupiah(itemTotal)}</span>
                    </div>
                `;
            });

            const isMember = "<?php echo $is_member ? 'true' : 'false'; ?>" === "true";
            const discount = isMember ? subtotal * 0.10 : 0;
            const voucherDiscount = data.voucherDiscount || 0;
            const taxable = subtotal - discount - voucherDiscount;
            const tax = 2500;
            const grandTotal = taxable + tax;

            if (discount > 0) {
                receiptHTML += `
                    <div class="receipt-item" style="color: #27ae60; margin-top: 10px;">
                        <span>Diskon Member (10%)</span>
                        <span>-${formatRupiah(discount)}</span>
                    </div>
                `;
            }
            if (voucherDiscount > 0) {
                receiptHTML += `
                    <div class="receipt-item" style="color: #27ae60; margin-top: 5px;">
                        <span>Voucher Diskon</span>
                        <span>-${formatRupiah(voucherDiscount)}</span>
                    </div>
                `;
            }
            receiptHTML += `
                <div class="receipt-item" style="color: var(--text-light);">
                    <span>Biaya penanganan</span>
                    <span>+${formatRupiah(tax)}</span>
                </div>
                <div class="receipt-item total">
                    <span>Total Pembayaran</span>
                    <span>${formatRupiah(grandTotal)}</span>
                </div>
            `;
            document.getElementById('modalReceipt').innerHTML = receiptHTML;

            const btnDownload = document.querySelector('.modal-footer .btn-primary');
            if (data.status === "Selesai") {
                btnDownload.disabled = false;
                btnDownload.style.opacity = "1";
                btnDownload.style.cursor = "pointer";
                btnDownload.innerHTML = '<i class="fa-solid fa-download" style="margin-right: 8px;"></i> Download Struk';
            } else {
                btnDownload.disabled = true;
                btnDownload.style.opacity = "0.6";
                btnDownload.style.cursor = "not-allowed";
                btnDownload.innerHTML = '<i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Struk Tersedia Setelah Selesai';
            }

            overlay.classList.add('active');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.downloadReceiptPDF = () => {
            const id = document.getElementById('modalOrderId').innerText.replace('#', '');
            const data = dummyHistory.find(h => h.id === id);
            if (!data) return;

            let subtotal = 0;
            let itemsHtml = '';
            data.items.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                itemsHtml += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                        <span style="flex: 2; padding-right: 5px;">${item.name} ${item.notes ? '<br/><span style="font-size: 9px; color: #555;">* ' + item.notes + '</span>' : ''}</span>
                        <span style="flex: 1; text-align: center;">${item.qty}x</span>
                        <span style="flex: 1.5; text-align: right;">${formatRupiah(itemTotal)}</span>
                    </div>
                `;
            });

            const isMember = "<?php echo $is_member ? 'true' : 'false'; ?>" === "true";
            const discount = isMember ? subtotal * 0.10 : 0;
            const voucherDiscount = data.voucherDiscount || 0;
            const taxable = subtotal - discount - voucherDiscount;
            const tax = 2500;
            const grandTotal = taxable + tax;

            const dateOnly = data.date.includes(',') ? data.date.split(',').slice(0, -1).join(',').trim() : data.date;
            const timePart = data.date.includes(',') ? data.date.split(',').pop().trim() : data.date;

            // Generate a clean HTML string wrapper
            const receiptHtml = `
            <div style="padding: 15px; background: white; color: black; font-family: 'Courier New', Courier, monospace; font-size: 11px;">
                <div style="text-align: center; margin-bottom: 12px;">
                    <h2 style="margin: 0; font-size: 22px; font-weight: bold; letter-spacing: 1px;">PADUD COFFEE</h2>
                    <p style="margin: 4px 0 0;">Jl. Raya Utama No. 123, Kota</p>
                    <p style="margin: 2px 0 0;">Telp: 0812-3456-7890</p>
                </div>
                <div style="border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 8px 0; margin-bottom: 12px; line-height: 1.4;">
                    <div style="display: flex; justify-content: space-between;"><span>${dateOnly} ${timePart}</span><span>${data.id}</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>Kasir: Rina</span><span>Pelanggan: <?php echo $user_name; ?></span></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px dashed black; padding-bottom: 4px; margin-bottom: 8px;">
                    <span style="flex: 2;">Item</span><span style="flex: 1; text-align: center;">Qty</span><span style="flex: 1.5; text-align: right;">Total</span>
                </div>
                <div style="margin-bottom: 12px; line-height: 1.4;">
                    ${itemsHtml}
                </div>
                <div style="border-top: 1px dashed black; padding-top: 8px; line-height: 1.4;">
                    <div style="display: flex; justify-content: space-between;"><span>Subtotal</span><span>${formatRupiah(subtotal)}</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>Diskon Member</span><span>-${formatRupiah(discount)}</span></div>
                    ${voucherDiscount > 0 ? `<div style="display: flex; justify-content: space-between;"><span>Voucher Diskon</span><span>-${formatRupiah(voucherDiscount)}</span></div>` : ''}
                    <div style="display: flex; justify-content: space-between;"><span>Biaya penanganan</span><span>${formatRupiah(tax)}</span></div>
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-top: 6px; padding-top: 6px; border-top: 1px dashed black;">
                        <span>TOTAL</span><span>${formatRupiah(grandTotal)}</span>
                    </div>
                </div>
                <div style="border-top: 1px dashed black; margin-top: 12px; padding-top: 8px; line-height: 1.4;">
                    <div style="display: flex; justify-content: space-between;"><span>Tipe Pembayaran:</span><span style="font-weight: bold;">${data.payment}</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>Status:</span><span>LUNAS</span></div>
                </div>
                <div style="text-align: center; margin-top: 20px; font-size: 10px;">
                    <p style="margin: 0;">Terima kasih atas kunjungan Anda!</p>
                    <p style="margin: 2px 0 0;">Kritik & Saran: 0812-3456-7890</p>
                    <p style="margin: 2px 0 0;">IG: @padud.coffee</p>
                    <p style="margin: 8px 0 0;">*** Wi-Fi: Padud_Hotspot | Pass: padud2026 ***</p>
                </div>
            </div>`;

            const btn = document.querySelector('.modal-footer .btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i> Memproses PDF...';

            const opt = {
                margin: 5,
                filename: 'Struk_Padud_Coffee_' + data.id + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: [80, 250], orientation: 'portrait' }
            };

            // Pass the raw HTML string directly to html2pdf
            html2pdf().set(opt).from(receiptHtml).save().then(() => {
                btn.innerHTML = originalText;
            }).catch(err => {
                console.error("PDF generation error: ", err);
                btn.innerHTML = originalText;
                alert("Gagal membuat PDF. Silakan coba lagi.");
            });
        };

        // Cart Badge Logic
        const updateCartUI = () => {
            const badge = document.getElementById('nav-cart-badge');
            let cart = JSON.parse(localStorage.getItem('padud_cart')) || [];
            let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);

            if (badge) {
                if (totalQty > 0) {
                    badge.style.display = 'flex';
                    badge.innerText = totalQty;
                } else {
                    badge.style.display = 'none';
                }
            }
        };

        window.toggleNotif = (e) => {
            e.stopPropagation();
            const notif = document.getElementById('notif-dropdown');
            if (notif) notif.classList.toggle('active');
        };

        document.addEventListener('click', () => {
            const notif = document.getElementById('notif-dropdown');
            if (notif) notif.classList.remove('active');
        });

        window.onload = () => {
            updateCartUI();
            renderHistory();
        };
    </script>
